# fly.toml app configuration file generated for sentinelvault-dashboard on 2026-03-12T13:13:48+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sentinelvault-dashboard'
primary_region = 'iad'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '8080'
  SOLANA_RPC_URL = 'https://api.devnet.solana.com'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
